@if (showShell()) {
  <!-- --- Authenticated / Guest App Shell ----------------------------------- -->
  <mat-sidenav-container class="app-container">

    <!-- Sidebar only on desktop -->
    @if (!isMobile()) {
      <mat-sidenav
        #sidenav
        mode="side"
        opened
        [style.width]="navCollapsed() ? '4rem' : '15rem'"
      >
        <app-nav [(collapsed)]="navCollapsed" />
      </mat-sidenav>
    }

    <!-- Main content area -->
    <mat-sidenav-content>

      <main class="main-content">
        <router-outlet />
      </main>

      <!-- Mobile bottom navigation -->
      <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        @for (item of mobileNavItems; track item.path) {
          <a
            class="mobile-nav-item"
            [routerLink]="item.path"
            routerLinkActive="mobile-nav-item--active"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
        <button class="mobile-nav-item" type="button" (click)="toggleTheme()" [attr.aria-label]="darkLabel()">
          <mat-icon>{{ darkIcon() }}</mat-icon>
          <span>Theme</span>
        </button>
        @if (isAuth() || isGuest()) {
          <button class="mobile-nav-item" type="button" (click)="signOut()" aria-label="Sign out">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
          </button>
        }
      </nav>

    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <!-- --- Public pages (landing, auth) � no shell ---------------------------- -->
  <router-outlet />
}
