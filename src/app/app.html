@if (showShell()) {
  <!-- ─── Authenticated / Guest App Shell ─────────────────────────────────── -->
  <mat-sidenav-container class="app-container">

    <!-- Responsive sidenav: side mode on desktop, over (drawer) on mobile -->
    <mat-sidenav
      #sidenav
      [mode]="isMobile() ? 'over' : 'side'"
      [style.width]="navCollapsed() ? '4rem' : '15rem'"
    >
      <app-nav [(collapsed)]="navCollapsed" />
    </mat-sidenav>

    <!-- Main content area -->
    <mat-sidenav-content>

      <!-- Mobile top toolbar with hamburger toggle -->
      @if (isMobile()) {
        <mat-toolbar class="mobile-toolbar">
          <button mat-icon-button (click)="sidenav.toggle()" aria-label="Open navigation">
            <mat-icon>menu</mat-icon>
          </button>
          <span class="toolbar-brand">Bookshelf</span>
        </mat-toolbar>
      }

      <main class="main-content">
        <router-outlet />
      </main>

      <!-- Mobile bottom navigation -->
      <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
        @for (item of mobileNavItems; track item.path) {
          <a
            class="mobile-nav-item"
            [routerLink]="item.path"
            routerLinkActive="mobile-nav-item--active"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <!-- ─── Public pages (landing, auth) — no shell ──────────────────────────── -->
  <router-outlet />
}
